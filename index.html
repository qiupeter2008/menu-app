<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小学生每日菜谱</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #f5f0e8;
    min-height: 100vh;
    color: #2c2c2a;
    font-size: 15px;
    line-height: 1.6;
  }
  .header {
    background: #fff;
    border-bottom: 0.5px solid rgba(0,0,0,0.12);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header-icon {
    width: 36px; height: 36px;
    background: #EAF3DE;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .header h1 { font-size: 17px; font-weight: 500; color: #2c2c2a; }
  .header p { font-size: 12px; color: #5f5e5a; }
  .sync-status {
    margin-left: auto;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 20px;
    display: flex; align-items: center; gap: 4px;
  }
  .sync-status.synced { background: #EAF3DE; color: #27500A; }
  .sync-status.syncing { background: #FFF3CD; color: #856404; }
  .sync-status.error { background: #FFE0E0; color: #8B1A1A; }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  .container { max-width: 600px; margin: 0 auto; padding: 20px 16px 80px; }

  .date-banner {
    background: #fff;
    border-radius: 14px;
    border: 0.5px solid rgba(0,0,0,0.1);
    padding: 14px 18px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .date-banner-left .date-main { font-size: 22px; font-weight: 500; color: #27500A; }
  .date-banner-left .date-sub { font-size: 13px; color: #5f5e5a; }
  .confirm-badge {
    font-size: 12px; font-weight: 500;
    padding: 4px 10px; border-radius: 20px;
  }
  .confirm-badge.confirmed { background: #EAF3DE; color: #27500A; border: 0.5px solid #639922; }
  .confirm-badge.pending { background: #FAEEDA; color: #854F0B; border: 0.5px solid #BA7517; }

  .dish-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .dish-card {
    background: #fff;
    border-radius: 14px;
    border: 0.5px solid rgba(0,0,0,0.1);
    padding: 14px 12px;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .dish-card.locked { cursor: default; }
  .dish-card.locked:hover { transform: none; box-shadow: none; }
  .dish-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 4px;
    border-radius: 14px 14px 0 0;
  }
  .dish-card.meat::before { background: #D85A30; }
  .dish-card.veg::before { background: #639922; }
  .dish-card-label {
    font-size: 11px; font-weight: 500;
    padding: 2px 8px; border-radius: 20px;
    display: inline-block; margin-bottom: 6px; margin-top: 2px;
  }
  .dish-card.meat .dish-card-label { background: #FAECE7; color: #993C1D; }
  .dish-card.veg .dish-card-label { background: #EAF3DE; color: #3B6D11; }
  .dish-emoji { font-size: 26px; margin-bottom: 4px; display: block; }
  .dish-name { font-size: 15px; font-weight: 500; color: #2c2c2a; margin-bottom: 3px; }
  .dish-desc { font-size: 11px; color: #888780; line-height: 1.4; }
  .dish-avg-score {
    margin-top: 8px; font-size: 11px; color: #5f5e5a;
    display: flex; align-items: center; gap: 4px;
  }
  .score-dot { width: 8px; height: 8px; border-radius: 50%; background: #FAC775; display: inline-block; }
  .swap-hint { margin-top: 6px; font-size: 11px; color: #888780; display: flex; align-items: center; gap: 3px; }
  .dish-card.locked .swap-hint { display: none; }

  .confirm-btn-main {
    width: 100%; padding: 14px; background: #639922; color: #fff;
    border: none; border-radius: 12px; font-size: 15px; font-weight: 500;
    cursor: pointer; margin-bottom: 16px; letter-spacing: 1px;
  }
  .confirm-btn-main:active { transform: scale(0.98); }
  .confirm-btn-main:disabled { background: #ccc; cursor: default; transform: none; }

  .rating-section {
    background: #fff;
    border-radius: 14px;
    border: 0.5px solid rgba(0,0,0,0.1);
    padding: 18px;
    margin-bottom: 16px;
  }
  .rating-section h2 { font-size: 14px; font-weight: 500; color: #2c2c2a; margin-bottom: 14px; }
  .rating-users-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .rating-user-col { background: #f9f7f3; border-radius: 10px; padding: 10px 8px; }
  .rating-user-header { display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
  .user-name-input {
    background: transparent; border: none;
    border-bottom: 1px dashed rgba(0,0,0,0.2);
    font-size: 13px; color: #2c2c2a;
    width: 56px; text-align: center; outline: none; padding: 0 2px;
  }
  .user-name-input:focus { border-bottom-color: #639922; }
  .rating-dish-row { margin-bottom: 8px; }
  .rating-dish-row:last-child { margin-bottom: 0; }
  .rating-dish-label { font-size: 11px; color: #888780; margin-bottom: 3px; display: flex; align-items: center; gap: 4px; }
  .dish-type-tag { font-size: 11px; padding: 1px 6px; border-radius: 10px; font-weight: 500; }
  .dish-type-tag.meat { background: #FAECE7; color: #993C1D; }
  .dish-type-tag.veg { background: #EAF3DE; color: #3B6D11; }
  .rating-stars-row { display: flex; align-items: center; gap: 3px; }
  .star {
    width: 20px; height: 20px; cursor: pointer; border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; border: 0.5px solid rgba(0,0,0,0.12);
    background: #F1EFE8; transition: all 0.1s; user-select: none;
  }
  .star.active { background: #FAEEDA; border-color: #EF9F27; }
  .star:hover { background: #FAC775; }
  .rating-val { font-size: 12px; font-weight: 500; color: #BA7517; width: 22px; text-align: center; }

  .dish-rating-summary {
    display: flex; flex-direction: column; gap: 4px;
    background: #f9f7f3; border-radius: 8px; padding: 8px 10px;
    margin-bottom: 10px;
  }
  .dish-rating-summary-row { display: flex; align-items: center; gap: 6px; font-size: 12px; }
  .dish-rating-summary-row .user-label { color: #888780; width: 38px; }

  .confirm-btn-save {
    width: 100%; padding: 12px; background: #185FA5; color: #fff;
    border: none; border-radius: 12px; font-size: 14px; font-weight: 500;
    cursor: pointer;
  }
  .confirm-btn-save:active { transform: scale(0.98); }
  .confirm-btn-save:disabled { background: #aaa; cursor: default; }

  .history-section {
    background: #fff; border-radius: 14px;
    border: 0.5px solid rgba(0,0,0,0.1);
    padding: 18px; margin-bottom: 16px;
  }
  .history-section h2 { font-size: 14px; font-weight: 500; margin-bottom: 12px; }
  .top-dishes-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .top-dishes-col-title {
    font-size: 13px; font-weight: 500; color: #2c2c2a;
    margin-bottom: 8px; text-align: center;
    padding-bottom: 6px;
    border-bottom: 0.5px solid rgba(0,0,0,0.07);
  }
  .top-dish-item { background: #F1EFE8; border-radius: 10px; padding: 8px 6px; text-align: center; font-size: 12px; margin-bottom: 6px; }
  .top-dish-item:last-child { margin-bottom: 0; }
  .top-dish-item .top-dish-emoji { font-size: 20px; display: block; margin-bottom: 2px; }
  .top-dish-item .top-dish-name { color: #2c2c2a; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 12px; }
  .top-dish-item .top-dish-score { color: #BA7517; margin-top: 1px; font-size: 11px; }

  .history-list { margin-top: 4px; }
  .history-item { display: flex; align-items: flex-start; gap: 8px; padding: 8px 0; border-bottom: 0.5px solid rgba(0,0,0,0.07); }
  .history-item:last-child { border-bottom: none; }
  .history-date { color: #888780; width: 60px; flex-shrink: 0; font-size: 12px; padding-top: 1px; }
  .history-dishes { flex: 1; color: #2c2c2a; font-size: 12px; }
  .history-scores { flex: 1; color: #BA7517; font-size: 12px; text-align: right; }

  .toast {
    position: fixed; bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #2c2c2a; color: #fff;
    padding: 10px 20px; border-radius: 20px;
    font-size: 13px; opacity: 0; transition: all 0.3s;
    z-index: 999; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 480px) {
    .dish-cards { gap: 8px; }
    .dish-card { padding: 12px 10px; }
    .dish-emoji { font-size: 22px; }
    .dish-name { font-size: 14px; }
    .rating-users-row { gap: 8px; }
    .rating-user-col { padding: 8px 6px; }
    .star { width: 18px; height: 18px; font-size: 10px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">&#x1F371;</div>
  <div>
    <h1>小学生每日菜谱</h1>
    <p>荤素搭配 · 营养均衡</p>
  </div>
  <div class="sync-status syncing" id="syncStatus">
    <span class="sync-dot"></span>
    <span id="syncText">连接中…</span>
  </div>
</div>

<div class="container">
  <div class="date-banner">
    <div class="date-banner-left">
      <div class="date-main" id="dateMain"></div>

    <h2 style="margin-top:18px">历史记录</h2>
    <div class="history-list" id="historyList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

var SB_URL  = "https://ljfpefxnqfjyilkrrqb.supabase.co";
var SB_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxpamZwZWZ4bnFmanlpbGtycnFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyNDk5NjcsImV4cCI6MjA5MzgyNTk2N30.Q48FqOATCQYkXbOldMDt4yApBxU-jfpYJu2fao_s1AU";

function sbHeaders(extra){

    "Content-Type": "application/json"

}

/* 从云端加载今天的数据 */
function cloudLoad(date){

    headers: sbHeaders()
  }).then(function(r){ return r.json(); });
}

/* 从云端加载所有历史数据 */
function cloudLoadAll(){
  return fetch(SB_URL + "/rest/v1/menu_data?select=*&order=date.desc&limit=30", {
    headers: sbHeaders()
  }).then(function(r){ return r.json(); });
}

/* 写入/更新云端数据（upsert） */
function cloudSave(row){
  return fetch(SB_URL + "/rest/v1/menu_data", {
    method: "POST",
    headers: sbHeaders({ "Prefer": "resolution=merge-duplicates,return=minimal" }),
    body: JSON.stringify(row)
  });
}

/* ============ 菜库 ============ */
var DISHES = [

  {id:3,name:"清蒸鱼",type:"meat",emoji:"🐟",desc:"鲜嫩清淡，DHA丰富"},
  {id:4,name:"番茄炒蛋",type:"meat",emoji:"🍳",desc:"经典家常，营养均衡"},
  {id:5,name:"黄焖鸡",type:"meat",emoji:"🍗",desc:"鲜嫩多汁，香气十足"},
  {id:6,name:"宫保鸡丁",type:"meat",emoji:"🫚",desc:"微辣鲜香，儿童版少辣"},
  {id:7,name:"蒸蛋羹",type:"meat",emoji:"🥚",desc:"嫩滑细腻，易消化"},
  {id:8,name:"虾仁豆腐",type:"meat",emoji:"🦐",desc:"高钙高蛋白，清鲜可口"},
  {id:9,name:"照烧鸡腿",type:"meat",emoji:"🍗",desc:"甜咸平衡，孩子爱吃"},
  {id:10,name:"猪肝炒菠菜",type:"meat",emoji:"🥩",desc:"补铁补血，适合发育期"},
  {id:11,name:"炒三丝",type:"meat",emoji:"🥢",desc:"猪肉配蔬菜，均衡搭配"},
  {id:12,name:"红烧鱼块",type:"meat",emoji:"🐠",desc:"浓郁入味，刺少好吃"},
  {id:13,name:"清炒西兰花",type:"veg",emoji:"🥦",desc:"营养丰富，抗氧化强"},
  {id:14,name:"蒜蓉菠菜",type:"veg",emoji:"🥬",desc:"补铁补钙，清淡爽口"},
  {id:15,name:"番茄豆腐汤",type:"veg",emoji:"🍅",desc:"酸甜开胃，钙质丰富"},
  {id:16,name:"炒胡萝卜",type:"veg",emoji:"🥕",desc:"β-胡萝卜素护眼睛"},
  {id:17,name:"香菇炒白菜",type:"veg",emoji:"🍄",desc:"鲜香爽脆，增强免疫"},
  {id:18,name:"地三鲜",type:"veg",emoji:"🫑",desc:"土豆茄子柿椒，下饭神器"},
  {id:19,name:"凉拌黄瓜",type:"veg",emoji:"🥒",desc:"清爽解腻，夏日首选"},
  {id:20,name:"南瓜粥配炒青菜",type:"veg",emoji:"🎃",desc:"护胃养胃，色泽金黄"},
  {id:21,name:"白灼生菜",type:"veg",emoji:"🥗",desc:"清淡健康，蘸蒜蓉汁"},
  {id:22,name:"玉米炒松仁",type:"veg",emoji:"🌽",desc:"香甜脆嫩，孩子最爱"},
  {id:23,name:"蒸南瓜",type:"veg",emoji:"🥧",desc:"软糯香甜，维生素丰富"},
  {id:24,name:"木耳炒鸡蛋",type:"veg",emoji:"🍳",desc:"清脆爽滑，补血养颜"},
];

var MEAT_DISHES = DISHES.filter(function(d){ return d.type==="meat"; });
var VEG_DISHES  = DISHES.filter(function(d){ return d.type==="veg"; });

/* ============ 应用状态 ============ */
var state = {
  userNames:     ["天天", "青蛙"],
  today:         getToday(),
  todayMenu:     null,
  confirmed:     false,
  ratings:       {},        // date -> {menu:[id0,id1], 0:{d0,d1}, 1:{d0,d1}}
  dishScores:    {},        // dishId -> [{u, s}]
  currentRatings:{ 0:{d0:0,d1:0}, 1:{d0:0,d1:0} },
  _savedMarks:   {}
};

function getToday(){ var d=new Date(); return d.toISOString().slice(0,10); }

/* ============ 本地缓存（兜底） ============ */
function cacheLoad(){
  try {
    var raw = localStorage.getItem("menuApp_cache_v4");
    if(!raw) return;
    var s = JSON.parse(raw);
    state.userNames  = s.userNames  || ["天天","青蛙"];
    state.ratings    = s.ratings    || {};
    state.dishScores = s.dishScores || {};
    if(s.todayMenu && s.todayDate === state.today){
      state.todayMenu = s.todayMenu;
      state.confirmed = s.confirmed || false;
    }
  } catch(e){}
}

function cacheSave(){
  try {
    localStorage.setItem("menuApp_cache_v4", JSON.stringify({
      userNames:  state.userNames,
      ratings:    state.ratings,
      dishScores: state.dishScores,
      todayMenu:  state.todayMenu,
      todayDate:  state.today,
      confirmed:  state.confirmed
    }));
  } catch(e){}
}

/* ============ 云端数据 → state ============ */
function applyCloudRow(row){
  if(!row || !row.date) return;
  var date = row.date;
  /* ratings */
  if(row.ratings){
    state.ratings[date] = row.ratings;
  }
  /* dish_scores：合并（云端权威） */
  if(row.dish_scores){
    state.dishScores = row.dish_scores;
  }
  /* 今天的菜谱和确认状态 */
  if(date === state.today){
    if(row.today_menu && row.today_menu.length === 2){
      state.todayMenu = row.today_menu;
    }
    if(typeof row.confirmed === "boolean"){
      state.confirmed = row.confirmed;
    }
    if(row.user_names && row.user_names.length === 2){
      state.userNames = row.user_names;
    }
  }
}

/* ============ state → 云端行 ============ */
function buildCloudRow(){
  return {
    date:        state.today,
    today_menu:  state.todayMenu,
    confirmed:   state.confirmed,
    user_names:  state.userNames,
    ratings:     state.ratings,
    dish_scores: state.dishScores,
    updated_at:  new Date().toISOString()
  };
}

/* ============ 同步状态指示 ============ */
function setSyncStatus(s, text){
  var el2 = el("syncStatus");
  el2.className = "sync-status " + s;
  el("syncText").textContent = text;
}

/* ============ 推荐算法 ============ */
function getDishWeight(dish){
  var entries = state.dishScores[dish.id] || [];
  if(entries.length === 0) return 1;
  var sum = entries.reduce(function(a,b){ return a + b.s; }, 0);
  return Math.max(0.1, sum / entries.length / 5);
}

function weightedRandom(dishes, excludeIds){
  var pool = dishes.filter(function(d){ return excludeIds.indexOf(d.id)===-1; });
  if(pool.length === 0) pool = dishes;
  var weights = pool.map(function(d){ return getDishWeight(d); });
  var total = weights.reduce(function(a,b){ return a+b; }, 0);
  var r = Math.random() * total;
  for(var i=0; i<pool.length; i++){
    r -= weights[i];
    if(r <= 0) return pool[i];
  }
  return pool[pool.length-1];
}

function pickTodayMenu(forceNew){
  if(!forceNew && state.todayMenu) return;
  state.todayMenu = [weightedRandom(MEAT_DISHES,[]), weightedRandom(VEG_DISHES,[])];
}

/* ============ 渲染 ============ */
function renderDate(){
  var d = new Date();
  var days = ["周日","周一","周二","周三","周四","周五","周六"];
  el("dateMain").textContent = d.getFullYear()+"年"+(d.getMonth()+1)+"月"+d.getDate()+"日";
  el("dateSub").textContent  = days[d.getDay()] + "  今日菜谱已推荐";
}

function renderDishes(){
  if(!state.todayMenu) return;
  var html = "";
  for(var i=0; i<state.todayMenu.length; i++){
    var dish = state.todayMenu[i];
    var avg  = computeDishAvg(dish.id);
    var avgText = avg !== null ? "均分 "+avg.toFixed(1) : "暂无评分";
    var lockedClass = state.confirmed ? "locked" : "";
    html += '<div class="dish-card '+dish.type+' '+lockedClass+'" onclick="swapDish('+i+')">'
          + '<div class="dish-card-label">'+(dish.type==="meat"?"荤菜":"素菜")+'</div>'
          + '<span class="dish-emoji">'+dish.emoji+'</span>'
          + '<div class="dish-name">'+dish.name+'</div>'
          + '<div class="dish-desc">'+dish.desc+'</div>'
          + '<div class="dish-avg-score"><span class="score-dot"></span>'+avgText+'</div>'
          + '<div class="swap-hint">&#x21BB; 点击换菜</div>'
          + '</div>';
  }
  el("dishCards").innerHTML = html;
}

function swapDish(idx){
  if(state.confirmed) return;
  var cur = state.todayMenu[idx];
  var pool = cur.type==="meat" ? MEAT_DISHES : VEG_DISHES;
  var excl = [cur.id];
  var other = state.todayMenu[1-idx];
  if(other && other.type === cur.type) excl.push(other.id);
  state.todayMenu[idx] = weightedRandom(pool, excl);
  state.confirmed = false;
  syncToCloud();
  renderAll();
  showToast(state.todayMenu[idx].name + " 换好了~");
}

function renderConfirmBadge(){
  var badge = el("confirmBadge");
  if(state.confirmed){
    badge.className = "confirm-badge confirmed";
    badge.textContent = "已确认";
  } else {
    badge.className = "confirm-badge pending";
    badge.textContent = "待确认";
  }
  var btn = el("confirmBtnMain");
  btn.disabled    = state.confirmed;
  btn.textContent = state.confirmed ? "今日菜谱已确认" : "确认今日菜谱";
}

function confirmMenu(){
  if(state.confirmed) return;
  state.confirmed = true;
  syncToCloud();
  renderAll();
  showToast("今日菜谱已确认，不可再更换！");
}

/* ============ 评分区域 ============ */
function renderRatingArea(){
  if(!state.todayMenu) return;
  var menu = state.todayMenu;
  var html = "";
  for(var u=0; u<2; u++){
    html += '<div class="rating-user-col">'
          + '<div class="rating-user-header">'
          + '<input class="user-name-input" value="'+esc(state.userNames[u])+'" onchange="updateUserName('+u+',this.value)" maxlength="6">'
          + '</div>';
    for(var di=0; di<2; di++){
      var dish = menu[di];
      var val  = state.currentRatings[u]["d"+di] || 0;
      html += '<div class="rating-dish-row">'
            + '<div class="rating-dish-label">'
            + '<span class="dish-type-tag '+dish.type+'">'+(dish.type==="meat"?"荤":"素")+'</span>'
            + '<span style="font-size:12px;color:#2c2c2a">'+dish.name+'</span>'
            + '</div>'
            + '<div class="rating-stars-row">';
      for(var s=1; s<=10; s++){
        html += '<div class="star '+(s<=val?"active":"")+'" onclick="setStar('+u+','+di+','+s+')">'+(s<=val?"★":"☆")+'</div>';
      }
      html += '<span class="rating-val">'+(val>0?val:"-")+'</span></div></div>';
    }
    html += '</div>';
  }
  el("ratingUsersRow").innerHTML = html;
  renderDishRatingSummary();
}

function setStar(user, dishIdx, score){
  state.currentRatings[user]["d"+dishIdx] = score;
  renderRatingArea();
}

function updateUserName(idx, val){
  state.userNames[idx] = (val||"").trim() || (idx===0?"天天":"青蛙");
  renderRatingArea();
  renderTopDishesCols();
  syncToCloud();
}

function renderDishRatingSummary(){
  if(!state.todayMenu) return;
  var html = "";
  for(var u=0; u<2; u++){
    var r = state.currentRatings[u];
    html += '<div class="dish-rating-summary-row">'
          + '<span class="user-label">'+state.userNames[u]+'</span>'
          + '<span>荤:'+(r.d0>0?r.d0:"-")+'</span>'
          + '<span>素:'+(r.d1>0?r.d1:"-")+'</span>'
          + '</div>';
  }
  el("dishRatingSummary").innerHTML = html;
}

/* ============ 保存评分 ============ */
function loadTodayRatings(){
  var td = state.ratings[state.today];
  for(var u=0; u<2; u++){
    if(td && td[u]){
      state.currentRatings[u] = { d0: td[u].d0||0, d1: td[u].d1||0 };
    } else {
      state.currentRatings[u] = { d0:0, d1:0 };
    }
  }
}

function saveRatings(){
  var hasAny = false;
  for(var u=0; u<2; u++){
    var r = state.currentRatings[u];
    if(r.d0===0 && r.d1===0) continue;
    hasAny = true;
    if(!state.ratings[state.today]) state.ratings[state.today] = {};
    state.ratings[state.today].menu = [state.todayMenu[0].id, state.todayMenu[1].id];
    state.ratings[state.today][u]   = { d0:r.d0, d1:r.d1 };
    for(var di=0; di<2; di++){
      var score = r["d"+di];
      if(score > 0){
        var dishId = state.todayMenu[di].id;
        if(!state.dishScores[dishId]) state.dishScores[dishId] = [];
        var mark = state.today+"_u"+u+"_d"+di;
        if(!state._savedMarks[mark]){
          state.dishScores[dishId].push({u:u, s:score});
          state._savedMarks[mark] = true;
        }
      }
    }
  }
  if(!hasAny){ showToast("请至少给一道菜打分~"); return; }

  el("saveBtn").disabled = true;
  el("saveBtn").textContent = "保存中…";

  syncToCloud(function(ok){
    el("saveBtn").disabled = false;
    el("saveBtn").textContent = "保存评分";
    if(ok){
      renderAll();
      showToast("评分已保存并同步！");
    } else {
      cacheSave();
      renderAll();
      showToast("已保存本地，网络恢复后自动同步");
    }
  });
}

/* ============ 云端同步 ============ */
function syncToCloud(callback){
  setSyncStatus("syncing", "同步中…");
  cacheSave();
  cloudSave(buildCloudRow())
    .then(function(resp){
      if(resp.ok || resp.status === 201 || resp.status === 200 || resp.status === 204){
        setSyncStatus("synced", "已同步");
        if(callback) callback(true);
      } else {
        return resp.text().then(function(t){
          console.warn("Sync error:", resp.status, t);
          setSyncStatus("error", "同步失败");
          if(callback) callback(false);
        });
      }
    })
    .catch(function(err){
      console.warn("Sync error:", err);
      setSyncStatus("error", "网络异常");
      if(callback) callback(false);
    });
}

/* 从云端拉取所有历史，更新 state */
function syncFromCloud(callback){
  setSyncStatus("syncing", "连接中…");
  cloudLoadAll()
    .then(function(rows){
      if(!Array.isArray(rows)){ throw new Error("bad response"); }
      rows.forEach(function(row){ applyCloudRow(row); });
      setSyncStatus("synced", "已同步");
      cacheSave();
      if(callback) callback(true);
    })
    .catch(function(err){
      console.warn("Cloud load error:", err);
      setSyncStatus("error", "无法连接云端");
      if(callback) callback(false);
    });
}

/* ============ 历史最受欢迎 ============ */
function computeUserDishAvg(uid){
  var result = [];
  for(var i=0; i<DISHES.length; i++){
    var d = DISHES[i];
    var entries = state.dishScores[d.id] || [];
    var scores  = entries.filter(function(o){ return o.u===uid; }).map(function(o){ return o.s; });
    if(scores.length > 0){
      var avg = scores.reduce(function(a,b){ return a+b; },0) / scores.length;
      result.push({id:d.id, name:d.name, emoji:d.emoji, avg:avg});
    }
  }
  return result.sort(function(a,b){ return b.avg - a.avg; });
}

function renderTopDishesCols(){
  var html = "";
  for(var u=0; u<2; u++){
    var top = computeUserDishAvg(u).slice(0,3);
    html += '<div class="top-dishes-col">'
          + '<div class="top-dishes-col-title">'+state.userNames[u]+'最爱</div>';
    if(top.length===0){
      html += '<div style="font-size:12px;color:#888780;text-align:center;padding:8px 0">暂无评分</div>';
    } else {
      for(var i=0; i<top.length; i++){
        var d = top[i];
        html += '<div class="top-dish-item">'
              + '<span class="top-dish-emoji">'+d.emoji+'</span>'
              + '<div class="top-dish-name">'+d.name+'</div>'
              + '<div class="top-dish-score">均分 '+d.avg.toFixed(1)+'</div>'
              + '</div>';
      }
    }
    html += '</div>';
  }
  el("topDishesCols").innerHTML = html;
}

/* ============ 历史记录 ============ */
function renderHistory(){
  var dates = Object.keys(state.ratings).sort(function(a,b){ return b.localeCompare(a); });
  var show  = dates.slice(0,5);
  if(show.length === 0){
    el("historyList").innerHTML = '<div style="font-size:13px;color:#888780;padding:8px 0">暂无记录</div>';
    return;
  }
  var html = "";
  for(var i=0; i<show.length; i++){
    var date = show[i];
    var dt   = state.ratings[date];
    var dishNames = ["?","?"];
    if(dt.menu){
      var d0 = DISHES.find(function(x){ return x.id===dt.menu[0]; });
      var d1 = DISHES.find(function(x){ return x.id===dt.menu[1]; });
      if(d0) dishNames[0] = d0.name;
      if(d1) dishNames[1] = d1.name;
    }
    var scoreStr = "";
    for(var u=0; u<2; u++){
      if(dt[u]){
        var r = dt[u]; var parts = [];
        if(r.d0>0) parts.push("荤"+r.d0);
        if(r.d1>0) parts.push("素"+r.d1);
        if(parts.length>0) scoreStr += state.userNames[u]+":"+parts.join("/")+" ";
      }
    }
    html += '<div class="history-item">'
          + '<div class="history-date">'+date.slice(5)+'</div>'
          + '<div class="history-dishes">'+dishNames.join(" / ")+'</div>'
          + '<div class="history-scores">'+(scoreStr||"-")+'</div>'
          + '</div>';
  }
  el("historyList").innerHTML = html;
}

/* ============ 工具 ============ */
function computeDishAvg(dishId){
  var entries = state.dishScores[dishId];
  if(!entries || entries.length===0) return null;
  return entries.reduce(function(a,b){ return a+b.s; },0) / entries.length;
}
function esc(s){ var d=document.createElement("div"); d.textContent=s; return d.innerHTML; }
function el(id){ return document.getElementById(id); }
function showToast(msg){
  var t = el("toast");
  t.textContent = msg;
  t.className = "toast show";
  setTimeout(function(){ t.className = "toast"; }, 2500);
}

function renderAll(){
  renderDate();
  renderConfirmBadge();
  renderDishes();
  loadTodayRatings();
  renderRatingArea();
  renderTopDishesCols();
  renderHistory();
}

/* ============ 启动 ============ */
function init(){
  /* 1. 先从本地缓存加载，立即显示 */
  cacheLoad();
  pickTodayMenu(false);
  renderAll();

  /* 2. 从云端拉取最新数据，合并后刷新 */
  syncFromCloud(function(ok){
    if(ok){
      /* 云端加载成功后，再次判断今日菜谱 */
      pickTodayMenu(false);
      /* 若今日在云端无菜谱，把本地生成的菜谱写上去 */
      if(state.todayMenu){
        renderAll();
        syncToCloud(); /* 确保今日菜谱写入云端 */
      }
    } else {
      /* 网络不通，继续用本地缓存 */
      pickTodayMenu(false);
      renderAll();
    }
  });

  /* 3. 每 60 秒自动刷新一次（另一人打分后能看到） */
  setInterval(function(){
    syncFromCloud(function(ok){
      if(ok){ loadTodayRatings(); renderRatingArea(); renderTopDishesCols(); renderHistory(); }
    });
  }, 60000);
}

init();
</script>
